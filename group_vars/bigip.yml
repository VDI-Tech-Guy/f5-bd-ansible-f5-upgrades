---
# =============================================================================
# group_vars/bigip.yml
# =============================================================================
# Shared variables for ALL BIG-IP devices (standalone and HA).
# These are baseline defaults. Override per-host in host_vars/<hostname>.yml.
#
# CREDENTIALS: ansible_user and ansible_password must come from:
#   - AAP Machine Credential (recommended)
#   - Ansible Vault encrypted vars
#   - Never plaintext in this file
# =============================================================================

# -----------------------------------------------------------------------------
# Connection - httpapi over iControl REST
# -----------------------------------------------------------------------------
ansible_connection: httpapi
ansible_network_os: f5networks.f5_bigip.bigip
ansible_httpapi_port: 443
ansible_httpapi_use_ssl: true
ansible_httpapi_validate_certs: false

# -----------------------------------------------------------------------------
# Upgrade defaults
# These are baseline fallbacks. Override via AAP Extra Vars for each run.
# -----------------------------------------------------------------------------
bigip_image_local_path: "/mnt/software/bigip"
bigip_image_remote_path: "/var/config/rest/downloads"
bigip_install_volume: "HD1.2"
bigip_reboot_after_install: true
bigip_upgrade_dry_run: false
bigip_failback: false

# -----------------------------------------------------------------------------
# Wait / reboot timing defaults
# -----------------------------------------------------------------------------
bigip_reboot_initial_delay: 60
bigip_wait_retry_delay: 20
bigip_wait_max_retries: 30
bigip_ssh_port: 22
bigip_https_port: 443

# -----------------------------------------------------------------------------
# Snapshot defaults
# -----------------------------------------------------------------------------
snapshot_output_dir: "/runner/artifacts/snapshots"
bigip_snapshot_save_ucs: true
bigip_ucs_path: "/var/local/ucs"
snapshot_fail_on_regression: true
snapshot_pool_member_down_threshold_pct: 0
