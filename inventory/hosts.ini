# f5-bd-ansible-f5-upgrades - Example Inventory
# This is a REFERENCE ONLY - the actual inventory is managed in AAP.
# Credentials must come from AAP Machine Credentials - never store plaintext here.
#
# AAP Inventory structure:
#   - bastion         (standalone host, no group)
#   - bigip_ha        (group containing HA BIG-IP pairs)
#   - bigip_standalone (group for standalone BIG-IP devices)
#   - f5os_rseries    (group for rSeries appliances)
#   - f5os_velos_controller
#   - f5os_velos_partition
#
# group_vars files in this repo match the AAP group names directly:
#   group_vars/bigip_ha.yml     -> applies to [bigip_ha] group
#   group_vars/f5os.yml         -> applies to F5OS groups

# =============================================================================
# Bastion Host - standalone, no group
# =============================================================================
bastion ansible_host=192.170.7.50 ansible_connection=ssh ansible_become=true ansible_become_method=sudo

# =============================================================================
# BIG-IP - HA Pairs
# All HA hosts go directly in [bigip_ha] - no child groups
# ha_role is a hint only - Play 0 queries live state and overrides it
# =============================================================================
[bigip_ha]
bigip-ha-01 ansible_host=192.168.1.20
bigip-ha-02 ansible_host=192.168.1.21

# =============================================================================
# BIG-IP - Standalone
# =============================================================================
[bigip_standalone]
bigip-standalone-01 ansible_host=192.168.1.10

# =============================================================================
# F5OS - rSeries
# =============================================================================
[f5os_rseries]
rseries-r2600-01 ansible_host=192.168.2.10

# =============================================================================
# F5OS - Velos
# =============================================================================
[f5os_velos_controller]
velos-chassis-01-ctrl ansible_host=192.168.3.10

[f5os_velos_partition]
velos-chassis-01-part1 ansible_host=192.168.3.20

# =============================================================================
# Group connection vars - must match group_vars/*.yml filenames
# In AAP these are set via group_vars in the project, not here
# =============================================================================
[bigip_ha:vars]
ansible_connection=httpapi
ansible_network_os=f5networks.f5_bigip.bigip
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_httpapi_port=443

[bigip_standalone:vars]
ansible_connection=httpapi
ansible_network_os=f5networks.f5_bigip.bigip
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_httpapi_port=443

[f5os_rseries:vars]
ansible_connection=httpapi
ansible_network_os=f5networks.f5os.f5os
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_httpapi_port=443

[f5os_velos_controller:vars]
ansible_connection=httpapi
ansible_network_os=f5networks.f5os.f5os
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_httpapi_port=443

[f5os_velos_partition:vars]
ansible_connection=httpapi
ansible_network_os=f5networks.f5os.f5os
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_httpapi_port=443
