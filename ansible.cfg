[defaults]
# Inventory
inventory                = ./inventory

# Roles path - includes local roles and any installed collection roles
roles_path               = ./roles:~/.ansible/roles

# Collections path
collections_path         = ./collections:~/.ansible/collections

# Logging - useful for upgrade operations
log_path                 = ./ansible.log

# Retry files - keep in project dir
retry_files_enabled      = True
retry_files_save_path    = ./

# SSH settings
host_key_checking        = False
ssh_args                 = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

# Timeout - upgrades + reboots need generous timeouts
timeout                  = 300

# Output formatting
stdout_callback          = yaml
callback_whitelist       = timer, profile_tasks

# Fact caching - avoid re-gathering between plays in same run
fact_caching             = jsonfile
fact_caching_connection  = ./.facts_cache
fact_caching_timeout     = 7200

# Forks - upgrades should be sequential per device by default
forks                    = 5

[privilege_escalation]
become                   = False

[galaxy]
server_list              = release_galaxy, automation_hub

[galaxy_server.release_galaxy]
url                      = https://galaxy.ansible.com/

[galaxy_server.automation_hub]
url                      = https://console.redhat.com/api/automation-hub/content/published/
auth_url                 = https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
# token = <your_token_here>  # Set via env: ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_TOKEN
