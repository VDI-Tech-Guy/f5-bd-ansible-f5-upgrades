---
# =============================================================================
# bigip_upgrade - Image upload, volume install, and reboot
# =============================================================================

# -----------------------------------------------------------------------------
# Pre-flight checks
# -----------------------------------------------------------------------------

# Image staging (CIFS -> bastion -> BIG-IP /shared/images/) is handled by
# the bastion_image_push role which runs BEFORE this role in the playbook.
# By the time we get here the image is already on the BIG-IP and verified.

- name: "UPGRADE | Check current running version"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/version"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: bigip_current_version_check
  delegate_to: localhost
  no_log: true

- name: "UPGRADE | Set current version fact"
  ansible.builtin.set_fact:
    bigip_current_version: >-
      {{ bigip_current_version_check.json.entries
         ['https://localhost/mgmt/tm/sys/version/0']
         .nestedStats.entries.Version.description }}

- name: "UPGRADE | Display current version"
  ansible.builtin.debug:
    msg: "{{ ansible_host }} current version: {{ bigip_current_version }} | target: {{ bigip_target_version }}"

- name: "UPGRADE | Skip if target version already running"
  ansible.builtin.meta: end_host
  when: bigip_current_version is defined and bigip_target_version in bigip_current_version

# Image is already on BIG-IP /shared/images/ and verified by bastion_image_push.
# Confirm image is visible to the software subsystem before proceeding to install.

# -----------------------------------------------------------------------------
# Install to boot volume
# -----------------------------------------------------------------------------

- name: "UPGRADE | Install image to volume {{ bigip_install_volume }}"
  f5networks.f5_bigip.bigip_software_install:
    image: "{{ bigip_image_filename }}"
    state: installed
    volume: "{{ bigip_install_volume }}"
  register: bigip_install_result
  when: not bigip_upgrade_dry_run | bool

- name: "UPGRADE | Dry-run mode - skipping install and reboot"
  ansible.builtin.debug:
    msg: >-
      DRY RUN: Would install {{ bigip_image_filename }}
      to volume {{ bigip_install_volume }} on {{ ansible_host }}
  when: bigip_upgrade_dry_run | bool

# -----------------------------------------------------------------------------
# Activate (reboot into new volume)
# The connection WILL drop here - this is expected and handled by block/rescue
# -----------------------------------------------------------------------------

- name: "UPGRADE | Activate new volume - reboot will drop connection"
  block:
    - name: "UPGRADE | Set boot volume and reboot"
      f5networks.f5_bigip.bigip_software_install:
        image: "{{ bigip_image_filename }}"
        state: activated
        volume: "{{ bigip_install_volume }}"
      when: bigip_reboot_after_install | bool and not bigip_upgrade_dry_run | bool
      ignore_errors: true  # Connection drops immediately on reboot - expected

    - name: "UPGRADE | Reboot triggered - connection drop is expected"
      ansible.builtin.debug:
        msg: "Reboot initiated on {{ ansible_host }} - waiting for device to come back..."
  rescue:
    - name: "UPGRADE | Connection dropped during reboot - this is expected"
      ansible.builtin.debug:
        msg: >-
          Connection to {{ ansible_host }} dropped (expected during reboot).
          The bigip_wait role will now poll until the device is back online.
  when: not bigip_upgrade_dry_run | bool
