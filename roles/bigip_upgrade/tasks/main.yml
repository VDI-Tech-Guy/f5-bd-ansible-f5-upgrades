---
# =============================================================================
# bigip_upgrade - Image install and activation
# =============================================================================
# Image is already on BIG-IP /shared/images/ verified by bastion_image_push.
#
# Single module call with state=activated:
#   - Installs image to volume
#   - Waits for installation to complete
#   - Activates (reboots into) the new volume
#
# timeout: 3600 gives the module up to 1 hour to complete install + activate.
# Connection drops during reboot - caught by failed_when checking for
# connection-related errors only. bigip_wait handles the rest.
# =============================================================================

# -----------------------------------------------------------------------------
# Pre-flight - version check
# -----------------------------------------------------------------------------

- name: "UPGRADE | Check current running version"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/version"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 60
  register: bigip_current_version_check
  delegate_to: localhost
  retries: 10
  delay: 15
  until: bigip_current_version_check.status == 200
  # TROUBLESHOOTING: no_log: true

- name: "UPGRADE | Fail if version check did not succeed"
  ansible.builtin.fail:
    msg: "Could not reach {{ ansible_host }} after 10 retries. Halting upgrade."
  when: bigip_current_version_check.status != 200

- name: "UPGRADE | Set current version fact"
  ansible.builtin.set_fact:
    bigip_current_version: >-
      {{ bigip_current_version_check.json.get('entries', {})
         .get('https://localhost/mgmt/tm/sys/version/0', {})
         .get('nestedStats', {})
         .get('entries', {})
         .get('Version', {})
         .get('description', 'unknown') }}

- name: "UPGRADE | Display current version"
  ansible.builtin.debug:
    msg: "{{ ansible_host }} current version: {{ bigip_current_version }} | target: {{ bigip_target_version }}"

- name: "UPGRADE | Skip if target version already running"
  ansible.builtin.meta: end_host
  when: bigip_current_version is defined and bigip_target_version in bigip_current_version

# -----------------------------------------------------------------------------
# Single module call - install and activate
# state=activated handles: install -> wait for complete -> reboot
# timeout=3600 gives up to 1 hour for install + activation
# Connection drops on reboot - caught by failed_when
# -----------------------------------------------------------------------------

- name: "UPGRADE | Dry-run mode - skipping install and reboot"
  ansible.builtin.debug:
    msg: "DRY RUN: Would install {{ bigip_image_filename }} to {{ bigip_install_volume }} on {{ ansible_host }}"
  when: bigip_upgrade_dry_run | bool

- name: "UPGRADE | Install and activate image (state=activated)"
  f5networks.f5_bigip.bigip_software_install:
    image: "{{ bigip_image_filename }}"
    state: activated
    volume: "{{ bigip_install_volume }}"
    timeout: 3600
  register: bigip_activate_result
  failed_when:
    - bigip_activate_result is failed
    - >-
      'Connection' not in (bigip_activate_result.msg | default(''))
      and 'connection' not in (bigip_activate_result.msg | default(''))
      and 'reset' not in (bigip_activate_result.msg | default(''))
      and 'closed' not in (bigip_activate_result.msg | default(''))
      and 'timed out' not in (bigip_activate_result.msg | default(''))
      and 'timeout' not in (bigip_activate_result.msg | default(''))
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

- name: "UPGRADE | Set reboot_triggered fact"
  ansible.builtin.set_fact:
    bigip_reboot_triggered: >-
      {{ bigip_activate_result is not failed or
         'Connection' in (bigip_activate_result.msg | default('')) or
         'connection' in (bigip_activate_result.msg | default('')) or
         'reset' in (bigip_activate_result.msg | default('')) or
         'closed' in (bigip_activate_result.msg | default('')) or
         'timed out' in (bigip_activate_result.msg | default('')) or
         'timeout' in (bigip_activate_result.msg | default('')) }}
    cacheable: true
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

- name: "UPGRADE | Activation triggered - device is rebooting"
  ansible.builtin.debug:
    msg: >-
      Activation triggered on {{ ansible_host }}.
      Connection drop is expected during reboot.
      bigip_wait will poll until device is back online.
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
    - bigip_reboot_triggered | default(false) | bool
