---
galaxy_info:
  role_name: bastion_image_push
  author: f5networks
  description: >
    Stages a BIG-IP upgrade ISO from the bastion CIFS share to the BIG-IP
    device via SCP. Runs delegate_to: bastion_host so the SCP originates
    from the bastion (which has the CIFS mount) rather than the AAP EE
    (which cannot mount CIFS shares).
  min_ansible_version: "2.9"
collections:
  - ansible.builtin
dependencies: []
