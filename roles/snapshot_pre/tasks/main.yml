---
# =============================================================================
# snapshot_pre - Collect baseline state before upgrade
# =============================================================================
# Uses f5networks.f5_bigip.bigip_device_info for VS, pools, sync-status,
# system-info. Routes and ARP use bigip_command (no module subset available).
# HA failover state uses uri (no module subset available).
#
# Output: {{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json
# =============================================================================

- name: "SNAPSHOT_PRE | Ensure snapshot output directory exists on EE"
  ansible.builtin.file:
    path: "{{ snapshot_output_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost

# -----------------------------------------------------------------------------
# Module call - VS, pools, sync-status, system-info
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Collect device info via bigip_device_info module"
  f5networks.f5_bigip.bigip_device_info:
    gather_subset:
      - virtual-servers
      - ltm-pools
      - sync-status
      - system-info
  register: snap_device_info

# -----------------------------------------------------------------------------
# Routes and ARP via bigip_command (no gather_subset available)
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Get route table via tmsh"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh show /net route all-properties"
  register: snap_routes

- name: "SNAPSHOT_PRE | Get ARP table via tmsh"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh show /net arp all"
  register: snap_arp

# -----------------------------------------------------------------------------
# HA failover state via uri (no module subset available)
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Get HA failover state"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/failover/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 60
  register: snap_failover
  delegate_to: localhost
  retries: 5
  delay: 15
  until: snap_failover.status == 200
  # TROUBLESHOOTING: no_log: true

# -----------------------------------------------------------------------------
# Normalise HA state values
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Normalise - HA failover state"
  ansible.builtin.set_fact:
    snap_failover_state: >-
      {{ 'active' if snap_failover.json.get('apiRawValues', {})
         .get('apiAnonymous', '') | lower is search('active')
         else 'standby' }}

- name: "SNAPSHOT_PRE | Normalise - config sync state from module"
  ansible.builtin.set_fact:
    snap_sync_state: >-
      {{ snap_device_info.sync_status | default([]) | first
         | default({}) | json_query('status') | default('unknown') }}

# -----------------------------------------------------------------------------
# Save UCS backup
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Save and fetch UCS backup from BIG-IP to EE"
  f5networks.f5_bigip.bigip_ucs_fetch:
    src: "pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}"
    dest: "{{ snapshot_output_dir }}/"
    create_on_missing: true
    fail_on_missing: false
  register: snap_ucs_save
  when: bigip_snapshot_save_ucs | bool

# -----------------------------------------------------------------------------
# Write pre-snapshot JSON
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Write pre-snapshot JSON file"
  ansible.builtin.copy:
    dest: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json"
    content: "{{ snapshot_pre_data | to_nice_json }}"
    mode: '0644'
  vars:
    snapshot_pre_data:
      metadata:
        hostname: "{{ inventory_hostname }}"
        management_ip: "{{ ansible_host }}"
        phase: pre
        timestamp: "{{ snapshot_timestamp }}"
        version: "{{ snap_device_info.system_info.product_version | default('unknown') }}"
        ha_failover_state: "{{ snap_failover_state }}"
        sync_state: "{{ snap_sync_state }}"
        ucs_saved: "{{ bigip_snapshot_save_ucs | bool }}"
        ucs_name: >-
          {{ 'pre_upgrade_' + inventory_hostname + '_' + snapshot_timestamp
             if bigip_snapshot_save_ucs | bool else 'not_saved' }}
      virtual_servers: "{{ snap_device_info.virtual_servers | default([]) }}"
      ltm_pools: "{{ snap_device_info.ltm_pools | default([]) }}"
      routes: "{{ snap_routes.stdout_lines | default([]) }}"
      arp: "{{ snap_arp.stdout_lines | default([]) }}"
  delegate_to: localhost

- name: "SNAPSHOT_PRE | Summary"
  ansible.builtin.debug:
    msg: >-
      Pre-snapshot complete for {{ inventory_hostname }} |
      Version: {{ snap_device_info.system_info.product_version | default('unknown') }} |
      HA state: {{ snap_failover_state }} |
      Sync: {{ snap_sync_state }} |
      VS count: {{ snap_device_info.virtual_servers | default([]) | length }} |
      Pool count: {{ snap_device_info.ltm_pools | default([]) | length }} |
      File: {{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json
